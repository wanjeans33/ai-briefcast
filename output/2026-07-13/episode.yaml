        title: 双盲评审是什么
        body: 评的人**不知道**答案出自谁，被评的也不知道谁在评，和新药试验同款防偏心设计。所以98%这个认可率比自夸硬
      - kind: explainer
        grad: c5
        icon: ⚗️
        rel: 论文01
        title: 逆合成是什么
        body: 给一个目标分子，倒推**用什么原料、怎么一步步合成**，是药物研发的日常难题。这篇把单步准确率从0.63提到**0.72**

